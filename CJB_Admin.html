async function spLoadWeekWOs() {
  let source = _dashWOs;
  if (!source) {
    try {
      source = await fetchAll('Work Orders',
        `filterByFormula=${encodeURIComponent('NOT({Status}="Cancelled")')}&sort[0][field]=Scheduled Date&sort[0][direction]=asc`);
      _dashWOs = source; _dashLoadedAt = Date.now();
    } catch (e) { source = []; }
  }
  const mon = _azDate(_sp.weekStart.toISOString());
  const sun = _azDate(new Date(_sp.weekStart.getTime() + 6 * 24 * 3600000).toISOString());
  _sp.weekWOs = source.filter(w => {
    const d = _azDate(w.fields['Scheduled Date']);
    return d >= mon && d <= sun;
  });
  spRenderWeek();
  if (_sp.selDate) spRenderTimeGrid();
}

function spRenderTimeGrid() {
  const area = document.getElementById('sp-tarea');
  if (!area) return;
  const dayWOs = (_sp.weekWOs || []).filter(w => _azDate(w.fields['Scheduled Date']) === _sp.selDate);

  const blocked = dayWOs.map(w => {
    const st = w.fields['Scheduled Date'];
    if (!st) return null;
    const azSt = new Date(new Date(st).getTime() - 7 * 3600000);
    const sh = azSt.getUTCHours(), sm = azSt.getUTCMinutes();
    let eh = sh + 2, em = sm;
    const en = w.fields['Scheduled End'];
    if (en) {
      const azEn = new Date(new Date(en).getTime() - 7 * 3600000);
      eh = azEn.getUTCHours(); em = azEn.getUTCMinutes();
    }
    const custName = Array.isArray(w.fields['Customer Name']) ? w.fields['Customer Name'][0] : (w.fields['Customer Name'] || 'Scheduled');
    return { sh, sm, eh, em, lbl: custName };
  }).filter(Boolean);

  let html = '<div class="sp-tgrid">';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      const isSel = _sp.startH === h && _sp.startM === m;
      const isBiz = h >= 8 && h < 17;
      const slotMin = h * 60 + m;
      const block = blocked.find(b => slotMin >= b.sh * 60 + b.sm && slotMin < b.eh * 60 + b.em);
      const isBlocked = !!block;
      const isFirst = isBlocked && slotMin === block.sh * 60 + block.sm;
      const ap = h >= 12 ? 'PM' : 'AM', dh = h % 12 || 12;
      const tlbl = m === 0 ? `${dh}:00 ${ap}` : '';
      let cls = 'sp-tslot' + (isBiz && !isBlocked ? ' sp-biz' : '') + (isSel ? ' sp-sel' : '') + (isBlocked ? ' sp-blocked' : '');
      const click = isBlocked ? '' : `onclick="spPickSlot(${h},${m})"`;
      const slabel = isSel ? `✓ ${dh}:${_pad(m)} ${ap}` : (isFirst ? esc(block.lbl) : '');
      html += `<div class="sp-trow">
        <div class="sp-tlbl">${esc(tlbl)}</div>
        <div class="${cls}" ${click}>${slabel ? `<div class="sp-tslot-lbl">${slabel}</div>` : ''}</div>
      </div>`;
    }
  }
  html += '</div>';
  area.innerHTML = html;

  // Scroll body to 7:30am (slot index 15)
  setTimeout(() => {
    const rows = area.querySelectorAll('.sp-trow');
    if (rows[15]) {
      const body = document.getElementById('sp-body');
      if (body) body.scrollTop = rows[15].offsetTop - 10;
    }
  }, 50);
}

function spPickSlot(h, m) {
  _sp.startH = h; _sp.startM = m;
  // After-hours: before 6am, at/after 6pm, or weekend
  const dow = _sp.selDate ? new Date(_sp.selDate + 'T12:00:00').getDay() : -1;
  const isAH = h < 6 || h >= 18 || dow === 0 || dow === 6;
  const ah = document.getElementById('sp-ah');
  const er = document.getElementById('sp-endrow');
  if (ah) ah.style.display = isAH ? 'block' : 'none';
  if (er) er.classList.add('visible');
  // Build end-time options (+30min to +8h in 30-min steps, default +2h)
  const sel = document.getElementById('sp-endsel');
  if (sel) {
    let opts = '';
    for (let delta = 30; delta <= 480; delta += 30) {
      const totMin = h * 60 + m + delta;
      const eh = Math.floor(totMin / 60) % 24, em = totMin % 60;
      const ap2 = eh >= 12 ? 'PM' : 'AM', dh2 = eh % 12 || 12;
      opts += `<option value="${delta}"${delta === 120 ? ' selected' : ''}>${dh2}:${_pad(em)} ${ap2} (+${delta >= 60 ? delta / 60 + 'h' : delta + 'm'})</option>`;
    }
    sel.innerHTML = opts;
  }
  spRenderTimeGrid();
}

function spNavWeek(dir) {
  _sp.weekStart = new Date(_sp.weekStart.getTime() + dir * 7 * 24 * 3600000);
  _sp.weekWOs = null; _sp.selDate = null; _sp.startH = null; _sp.startM = null;
  const area = document.getElementById('sp-tarea');
  if (area) area.innerHTML = '<div style="text-align:center;padding:30px 0;color:#bbb;font-size:13px;">Select a day above to see available times</div>';
  const ah = document.getElementById('sp-ah');
  const er = document.getElementById('sp-endrow');
  if (ah) ah.style.display = 'none';
  if (er) er.classList.remove('visible');
  spRenderWeek();
  spLoadWeekWOs();
}

function spGoNext() {
  if (_sp.step === 1) {
    _sp.newName  = (document.getElementById('sp-nname')?.value  || '').trim();
    _sp.newPhone = (document.getElementById('sp-nphone')?.value || '').trim();
    if (!_sp.cust && !_sp.newName) { alert('Select an existing customer or enter a new customer name.'); return; }
    _sp.step = 2;
  } else if (_sp.step === 2) {
    _sp.woType   = document.getElementById('sp-type')?.value    || 'Maintenance';
    _sp.priority = document.getElementById('sp-pri')?.value     || 'Routine';
    _sp.mode     = document.getElementById('sp-mode')?.value    || ' All Units';
    _sp.propId   = document.getElementById('sp-prop')?.value    || null;
    _sp.contId   = document.getElementById('sp-contact')?.value || null;
    _sp.prob     = (document.getElementById('sp-prob')?.value   || '').trim();
    _sp.notes    = (document.getElementById('sp-notes')?.value  || '').trim();
    _sp.step = 3;
  }
  spRender();
}

function spGoBack() {
  _sp.step = Math.max(1, _sp.step - 1);
  spRender();
}

async function spBook() {
  if (_sp.startH === null || !_sp.selDate) { alert('Please select a date and time slot.'); return; }
  const btn = document.getElementById('sp-book-btn');
  btn.disabled = true; btn.textContent = 'Booking…';
  try {
    let custId = _sp.cust?.id || null;
    if (!custId) {
      const res = await fetch(`${PROXY}/Customers`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: { 'Customer Name': _sp.newName, ...(_sp.newPhone ? { 'Phone': _sp.newPhone } : {}), 'Active': true } })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Failed to create customer');
      custId = data.id;
      allCustomers.push(data);
      filteredCustomers = [...allCustomers];
      renderCustList();
    }

    // AZ local time → UTC: AZ date midnight UTC + slot offset + 7h
    const startMs = new Date(_sp.selDate + 'T00:00:00Z').getTime()
                  + (_sp.startH * 60 + _sp.startM) * 60000
                  + 7 * 3600000;
    const delta = parseInt(document.getElementById('sp-endsel')?.value || '120');
    const startUTC = new Date(startMs).toISOString();
    const endUTC   = new Date(startMs + delta * 60000).toISOString();

    const techId = document.getElementById('sp-tech')?.value || null;
    const custName = _sp.cust?.fields['Customer Name'] || _sp.newName;
    const dateStr  = new Date(_sp.selDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    const fields = {
      'Work Order Name':  `${custName} — ${dateStr}`,
      'Customer':         [custId],
      'Work Order Type':  _sp.woType,
      'Priority':         _sp.priority,
      'Service Mode':     _sp.mode,
      'Scheduled Date':   startUTC,
      'Scheduled End':    endUTC,
      'Status':           'Scheduled',
      'Active':           true,
    };
    if (_sp.propId)  fields['Property']            = [_sp.propId];
    if (_sp.contId)  fields['Primary Contact']     = [_sp.contId];
    if (techId)      fields['Technician']          = [techId];
    if (_sp.prob)    fields['Problem Description'] = _sp.prob;
    if (_sp.notes)   fields['Notes']              = _sp.notes;

    const res = await fetch(`${PROXY}/Work%20Orders`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));

    closeSchedPanel();
    _dashWOs = null;
    loadDashboard(true);
    if (selectedCustomer?.id === custId) selectCustomer(custId);

  } catch (err) {
    btn.disabled = false; btn.textContent = 'Book Appointment';
    alert('Error: ' + err.message);
  }
}

init();
</script>
</body>
</html>
