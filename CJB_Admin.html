<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJB — Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f0f0; color: #2e2e2e; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.header { background: #c81f25; color: #fff; padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.header h1 { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 13px; opacity: 0.75; margin-left: auto; }

.app { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 290px; flex-shrink: 0; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-hd { padding: 12px 14px 10px; border-bottom: 1px solid #ebebeb; }
.sidebar-hd h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #999; margin-bottom: 8px; }
.search-box { width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
.search-box:focus { border-color: #c81f25; }
.cust-list { overflow-y: auto; flex: 1; }
.cust-item { padding: 10px 14px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: background 0.1s; }
.cust-item:hover { background: #fafafa; }
.cust-item.active { background: #fff5f5; border-left: 3px solid #c81f25; padding-left: 11px; }
.ci-name { font-size: 13px; font-weight: 600; }
.ci-meta { font-size: 11px; color: #999; margin-top: 2px; }
.empty-list { padding: 24px; text-align: center; font-size: 13px; color: #bbb; }

/* Detail */
.detail { flex: 1; overflow-y: auto; padding: 20px; }
.empty-state { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #ccc; flex-direction: column; gap: 8px; }
.empty-state .arrow { font-size: 28px; }

/* Customer header card */
.cust-card { background: #fff; border-radius: 10px; padding: 18px 22px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.cust-card-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.cust-card-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: #555; }
.cust-card-meta span { display: flex; align-items: center; gap: 5px; }

/* Section card */
.section { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #aaa; margin-bottom: 12px; }

/* Property rows */
.prop-row { padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
.prop-row:last-child { border-bottom: none; }
.prop-row-name { font-size: 13px; font-weight: 600; }
.prop-row-addr { font-size: 12px; color: #777; margin-top: 2px; }

/* Work order rows */
.wo-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #ebebeb; border-radius: 8px; margin-bottom: 8px; }
.wo-row:last-child { margin-bottom: 0; }
.wo-info { flex: 1; min-width: 0; }
.wo-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wo-meta { font-size: 11px; color: #888; margin-top: 3px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-scheduled   { background: #e3f0ff; color: #1a4f8a; }
.b-in-progress { background: #fff3cd; color: #7a5500; }
.b-complete    { background: #d4edda; color: #155724; }
.b-invoiced    { background: #e2d9f3; color: #4a235a; }
.b-paid        { background: #c3e6cb; color: #0d4a1f; }
.b-cancelled   { background: #f0f0f0; color: #999; }
.b-on-hold     { background: #ffe4b5; color: #7a4500; }

/* Buttons */
.btn { border: none; border-radius: 7px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-red   { background: #c81f25; color: #fff; }
.btn-green { background: #1a6b35; color: #fff; }
.btn-gray  { background: #888; color: #fff; }
.btn-sm    { padding: 6px 13px; font-size: 12px; }

/* Loading spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #c81f25; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.52); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.hidden { display: none; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 700px; max-height: 92vh; overflow-y: auto; padding: 26px 28px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: #888; margin-bottom: 20px; }

/* Line items */
.li-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 10px; }
.li-table th { text-align: left; font-size: 11px; text-transform: uppercase; color: #aaa; padding: 6px 8px; border-bottom: 1px solid #e8e8e8; }
.li-table td { padding: 5px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.li-table td:last-child { text-align: right; }
.li-table input { border: 1px solid #ddd; border-radius: 5px; padding: 5px 7px; font-size: 13px; font-family: inherit; }
.li-table input:focus { outline: none; border-color: #c81f25; }
.inp-name  { width: 100%; }
.inp-qty   { width: 56px; text-align: center; }
.inp-price { width: 84px; text-align: right; }
.sub-val   { font-weight: 600; color: #333; min-width: 72px; text-align: right; }
.del-btn   { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; line-height: 1; padding: 2px 4px; }
.del-btn:hover { color: #c81f25; }

/* Product dropdown */
.pd-wrap { position: relative; }
.pd-drop { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 7px 7px; max-height: 200px; overflow-y: auto; z-index: 300; box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
.pd-drop.hidden { display: none; }
.pd-opt { padding: 8px 12px; cursor: pointer; }
.pd-opt:hover { background: #f7f7f7; }
.pd-opt-name  { font-size: 13px; font-weight: 600; }
.pd-opt-price { font-size: 11px; color: #999; }

/* Total + notes */
.total-row { display: flex; justify-content: flex-end; align-items: baseline; gap: 14px; padding: 12px 8px 4px; border-top: 2px solid #ebebeb; margin-bottom: 16px; }
.total-lbl { font-size: 14px; color: #888; }
.total-amt { font-size: 26px; font-weight: 700; color: #c81f25; }
.notes-inp { width: 100%; border: 1px solid #ddd; border-radius: 7px; padding: 10px 12px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 64px; margin-bottom: 18px; }
.notes-inp:focus { outline: none; border-color: #c81f25; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

/* ── FORM MODAL ── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 5px; }
.form-inp { width: 100%; border: 1px solid #ddd; border-radius: 7px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #2e2e2e; background: #fff; }
.form-inp:focus { outline: none; border-color: #c81f25; box-shadow: 0 0 0 2px rgba(200,31,37,0.08); }
.form-inp:disabled { background: #f5f5f5; color: #aaa; }
textarea.form-inp { resize: vertical; min-height: 58px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
.form-section-hd { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #aaa; margin: 18px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; }
.same-addr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; color: #444; cursor: pointer; user-select: none; }
.same-addr-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #c81f25; flex-shrink: 0; }
.form-warn { font-size: 12px; color: #b05e00; background: #fff8ed; border: 1px solid #f5d9a8; border-radius: 6px; padding: 8px 12px; margin-bottom: 14px; }

/* ── SIDEBAR ADD BUTTON ── */
.sidebar-add-btn { display: block; width: 100%; padding: 7px 14px; border: 1px dashed #ddd; background: none; border-radius: 7px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; text-align: left; margin-top: 8px; font-family: inherit; }
.sidebar-add-btn:hover { background: #fff5f5; border-color: #c81f25; color: #c81f25; }

/* ── SECTION TITLE WITH ADD BUTTON ── */
.section-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title-row .section-title { margin-bottom: 0; }
.add-link { font-size: 11px; font-weight: 700; color: #c81f25; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
.add-link:hover { text-decoration: underline; }

/* ── INLINE EDIT BUTTON ── */
.btn-edit { background: #f4f4f4; color: #555; border: 1px solid #e0e0e0; border-radius: 5px; padding: 3px 9px; font-size: 11px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-edit:hover { background: #e8e8e8; }
.prop-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f2f2f2; }
.prop-row:last-child { border-bottom: none; }
.prop-row-text { flex: 1; min-width: 0; }

/* Job summary panel inside invoice modal */
.job-summary-panel { background: #f7f9fc; border: 1px solid #dce6f5; border-radius: 8px; padding: 14px 16px; margin-bottom: 18px; }
.job-summary-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #7a9ccf; font-weight: 700; margin-bottom: 10px; }
.job-block { padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #e4ecf7; }
.job-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.job-block-name { font-size: 13px; font-weight: 700; color: #1a2e4a; }
.job-block-type { font-size: 11px; color: #888; margin-left: 6px; }
.job-block-line { font-size: 12px; color: #444; margin-top: 4px; line-height: 1.5; }
.job-block-label { color: #888; margin-right: 4px; }

/* ── SECTION HEADER WITH MULTIPLE BUTTONS ── */
.section-title-btns { display: flex; gap: 10px; align-items: center; }

/* ── CONTACT BADGE ── */
.contact-primary { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: #e3f0ff; color: #1a4f8a; border-radius: 3px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }

/* ── LINK EXISTING MODAL ── */
.link-search { width:100%; padding:9px 12px; border:1px solid #ddd; border-radius:7px; font-size:13px; font-family:inherit; margin-bottom:10px; }
.link-search:focus { outline:none; border-color:#c81f25; }
.link-list { max-height:340px; overflow-y:auto; border:1px solid #ebebeb; border-radius:7px; }
.link-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid #f5f5f5; cursor:default; }
.link-item:last-child { border-bottom:none; }
.link-item-info { flex:1; min-width:0; }
.link-item-name { font-size:13px; font-weight:600; }
.link-item-meta { font-size:11px; color:#999; margin-top:2px; }
.link-empty { padding:20px; text-align:center; font-size:13px; color:#bbb; }

/* ── TABS ── */
.tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 20px; flex-shrink: 0; }
.tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 600; color: #888; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: color 0.1s; }
.tab-btn.active { color: #c81f25; border-bottom-color: #c81f25; }
.tab-btn:hover:not(.active) { color: #555; }

/* ── DASHBOARD ── */
.dash { flex: 1; overflow-y: auto; padding: 20px 24px; background: #f0f0f0; }
.dash-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
.stat-card { background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #aaa; margin-bottom: 6px; }
.stat-value { font-size: 30px; font-weight: 700; color: #2e2e2e; line-height: 1; }
.stat-sub { font-size: 12px; color: #999; margin-top: 5px; }
.stat-card.alert .stat-value { color: #c81f25; }
.stat-card.good .stat-value { color: #1a6b35; }

.dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }

.widget { background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.widget-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.widget-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #aaa; }
.widget-count { background: #f0f0f0; color: #888; border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
.widget-count.red { background: #ffeaea; color: #c81f25; }
.widget-count.gold { background: #fff8e0; color: #8a6500; }
.widget-refresh { font-size: 11px; color: #bbb; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.widget-refresh:hover { color: #c81f25; background: #fafafa; }
.widget-empty { font-size: 13px; color: #bbb; padding: 6px 0; }

/* Week strip */
.week-strip { display: flex; gap: 6px; }
.week-day { flex: 1; border-radius: 8px; padding: 10px 4px; text-align: center; background: #f7f7f7; }
.week-day.is-today { background: #fff5f5; border: 1.5px solid #c81f25; }
.week-day.has-jobs:not(.is-today) { background: #f0f6ff; }
.wd-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; }
.week-day.is-today .wd-name { color: #c81f25; }
.wd-num { font-size: 16px; font-weight: 700; color: #2e2e2e; margin: 3px 0 2px; }
.wd-count { font-size: 11px; color: #aaa; }
.week-day.has-jobs .wd-count { color: #1a4f8a; }
.week-day.is-today .wd-count { color: #c81f25; font-weight: 600; }

/* Today's schedule */
.sched-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f2f2f2; }
.sched-row:last-child { border-bottom: none; }
.sched-time { font-size: 12px; font-weight: 700; color: #555; width: 54px; flex-shrink: 0; padding-top: 2px; }
.sched-info { flex: 1; min-width: 0; }
.sched-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dash-link { cursor: pointer; }
.dash-link:hover .sched-name, .dash-link:hover .inv-name { color: #c81f25; text-decoration: underline; }
.sched-meta { font-size: 11px; color: #999; margin-top: 2px; }
.sched-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding-top: 1px; }

/* Invoice / flagged rows */
.inv-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.inv-row:last-child { border-bottom: none; }
.inv-info { flex: 1; min-width: 0; }
.inv-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inv-meta { font-size: 11px; color: #999; margin-top: 2px; }
.flag-note { font-size: 11px; color: #7a5000; background: #fff8e0; border-radius: 4px; padding: 3px 8px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }

/* ── MOBILE BACK BUTTON ── */
.mobile-back { display: none; width: 100%; padding: 12px 16px; background: #fff; border: none; border-bottom: 1px solid #e0e0e0; font-size: 14px; font-weight: 600; color: #c81f25; cursor: pointer; text-align: left; flex-shrink: 0; font-family: inherit; }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  body { overflow: hidden; }

  /* Header */
  .header { padding: 0 14px; height: 48px; }
  .header h1 { font-size: 15px; }
  .header-sub { font-size: 11px; }

  /* Tab bar */
  .tab-bar { padding: 0; }
  .tab-btn { flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; }

  /* Dashboard */
  .dash { padding: 12px; }
  .dash-grid-3 { grid-template-columns: 1fr; gap: 10px; margin-bottom: 12px; }
  .dash-row { grid-template-columns: 1fr; gap: 10px; }
  .week-strip { overflow-x: auto; gap: 6px; padding-bottom: 4px; }
  .week-strip::-webkit-scrollbar { height: 3px; }
  .week-day { min-width: 44px; flex-shrink: 0; }
  .stat-value { font-size: 26px; }

  /* Customers — single panel */
  .app { position: relative; overflow: hidden; }
  .sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; transition: transform 0.22s ease; }
  .sidebar.mobile-hidden { transform: translateX(-100%); }
  .detail { position: absolute; inset: 0; z-index: 10; background: #f0f0f0; overflow-y: auto; transform: translateX(100%); transition: transform 0.22s ease; display: flex; flex-direction: column; padding: 0; }
  .detail.mobile-visible { transform: translateX(0); }
  .detail > *:not(.mobile-back) { padding: 0 12px; }
  .detail > .mobile-back { display: block; position: sticky; top: 0; z-index: 5; }
  .cust-card { margin: 12px 12px 12px; border-radius: 8px; }
  .section { margin: 0 12px 12px; border-radius: 8px; }

  /* Customer card — wrap meta on mobile */
  .cust-card-meta { gap: 10px; }
  .cust-card-name { font-size: 18px; }

  /* Work order rows — wrap buttons */
  .wo-row { flex-wrap: wrap; gap: 8px; }
  .wo-info { width: 100%; }

  /* Bigger touch targets */
  .cust-item { padding: 13px 14px; }
  .btn { padding: 11px 18px; }
  .btn-sm { padding: 9px 14px; font-size: 13px; }
  .btn-edit { padding: 7px 12px; font-size: 12px; }

  /* Modals — full screen */
  .modal-bg { padding: 0; align-items: flex-end; }
  .modal { border-radius: 16px 16px 0 0; max-height: 94vh; max-width: 100%; padding: 20px 16px; }
  .modal-actions { flex-direction: column-reverse; }
  .modal-actions .btn { width: 100%; text-align: center; }

  /* Invoice modal — line items table scroll */
  .li-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .li-table { min-width: 440px; }
  .inp-name { min-width: 160px; }

  /* Form grids — single column */
  .form-row-2 { grid-template-columns: 1fr; }
  .form-row-3 { grid-template-columns: 1fr; }

  /* Sched row — wrap actions */
  .sched-row { flex-wrap: wrap; }
  .sched-actions { width: 100%; justify-content: flex-end; margin-top: 4px; }

  /* Sidebar search area */
  .sidebar-hd { padding: 10px 12px 8px; }
  .search-box { font-size: 16px; } /* prevents iOS zoom on focus */
}

/* ── SCHEDULE SLIDE-IN PANEL ───────────────────────────────────────────────── */
.sched-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
.sched-overlay.open { opacity: 1; pointer-events: all; }
.sched-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 460px; background: #fff; z-index: 401; transform: translateX(100%); transition: transform 0.24s ease; display: flex; flex-direction: column; box-shadow: -4px 0 28px rgba(0,0,0,0.18); }
.sched-panel.open { transform: translateX(0); }
.sp-hd { background: #c81f25; color: #fff; padding: 0 18px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.sp-hd-title { font-size: 16px; font-weight: 700; }
.sp-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; line-height: 1; padding: 4px 6px; opacity: 0.8; font-family: inherit; }
.sp-close:hover { opacity: 1; }
.sp-steps { display: flex; border-bottom: 1px solid #ebebeb; flex-shrink: 0; }
.sp-step { flex: 1; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #ccc; border-bottom: 2px solid transparent; }
.sp-step.sp-active { color: #c81f25; border-bottom-color: #c81f25; }
.sp-step.sp-done { color: #1a6b35; }
.sp-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.sp-foot { padding: 14px 20px; border-top: 1px solid #ebebeb; display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; background: #fff; }
/* Typeahead */
.sp-ta-wrap { position: relative; }
.sp-ta-drop { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; max-height: 220px; overflow-y: auto; z-index: 500; box-shadow: 0 6px 18px rgba(0,0,0,0.1); display: none; }
.sp-ta-drop.open { display: block; }
.sp-ta-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
.sp-ta-item:last-child { border-bottom: none; }
.sp-ta-item:hover { background: #f7f7f7; }
.sp-ta-name { font-size: 13px; font-weight: 600; }
.sp-ta-meta { font-size: 11px; color: #999; margin-top: 2px; }
.sp-sel-cust { display: flex; align-items: center; gap: 10px; background: #f4faf5; border: 1.5px solid #1a6b35; border-radius: 8px; padding: 11px 14px; margin-top: 10px; }
.sp-sel-info { flex: 1; }
.sp-sel-name { font-size: 13px; font-weight: 700; color: #1a2e1f; }

.sp-x-btn { background: none; border: none; font-size: 18px; color: #aaa; cursor: pointer; line-height: 1; padding: 2px; }
.sp-x-btn:hover { color: #c81f25; }
.sp-new-sect { margin-top: 20px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
.sp-new-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; margin-bottom: 10px; }
/* Week nav */
.sp-week-nav { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.sp-week-arr { background: none; border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px 12px; font-size: 16px; cursor: pointer; color: #555; font-family: inherit; line-height: 1; }
.sp-week-arr:hover { background: #f5f5f5; }
.sp-week-lbl { flex: 1; text-align: center; font-size: 12px; font-weight: 700; color: #555; }
.sp-days { display: flex; gap: 5px; margin-bottom: 14px; }
.sp-day-btn { flex: 1; border: 1.5px solid #e8e8e8; border-radius: 8px; padding: 7px 3px; text-align: center; cursor: pointer; background: #fafafa; font-family: inherit; transition: border-color 0.1s, background 0.1s; }
.sp-day-btn:hover { border-color: #c81f25; background: #fff5f5; }
.sp-day-btn.sp-has-wos { background: #f0f6ff; border-color: #c0d8f5; }
.sp-day-btn.sp-sel-day { background: #c81f25; border-color: #c81f25; }
.sp-day-btn.sp-sel-day .sp-db-n, .sp-day-btn.sp-sel-day .sp-db-d { color: #fff; }
.sp-db-n { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #aaa; }
.sp-db-d { font-size: 15px; font-weight: 700; color: #2e2e2e; margin: 2px 0 1px; }
.sp-db-dot { width: 5px; height: 5px; border-radius: 50%; background: #4a90d9; margin: 0 auto; visibility: hidden; }
.sp-day-btn.sp-has-wos:not(.sp-sel-day) .sp-db-dot { visibility: visible; }
/* Time grid */
.sp-tgrid { display: flex; flex-direction: column; }
.sp-trow { display: flex; align-items: stretch; }
.sp-tlbl { width: 54px; flex-shrink: 0; font-size: 11px; color: #bbb; padding: 0 8px 0 0; line-height: 26px; text-align: right; }
.sp-tslot { flex: 1; min-height: 26px; border-radius: 4px; margin: 1px 0; cursor: pointer; border: 1px solid transparent; transition: background 0.08s, border-color 0.08s; }
.sp-tslot.sp-biz { background: #f9f9f9; }
.sp-tslot.sp-biz:hover { background: #edf4ff; border-color: #b8d0f0; }
.sp-tslot:not(.sp-biz):not(.sp-blocked):not(.sp-sel):hover { background: #fafafa; border-color: #e0e0e0; }
.sp-tslot.sp-sel { background: #c81f25; border-color: #a8181d; cursor: default; }
.sp-tslot.sp-blocked { background: #e3f0ff; border-color: #b8d0f0; cursor: default; }
.sp-tslot-lbl { font-size: 10px; padding: 4px 8px; line-height: 1.3; pointer-events: none; }
.sp-tslot.sp-sel .sp-tslot-lbl { color: #fff; font-weight: 600; }
.sp-tslot.sp-blocked .sp-tslot-lbl { color: #1a4f8a; font-weight: 600; }
.sp-ah-warn { background: #fff8e0; border: 1px solid #f5d088; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #7a5500; margin: 12px 0; display: none; }
.sp-end-row { display: none; align-items: center; gap: 10px; background: #f7f7f7; border-radius: 8px; padding: 10px 14px; margin: 12px 0; }
.sp-end-row.visible { display: flex; }
.sp-end-lbl { font-size: 12px; color: #555; flex-shrink: 0; }
.sp-end-sel { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
.sp-end-sel:focus { outline: none; border-color: #c81f25; }
@media (max-width: 768px) {
  .sched-panel { width: 100%; }
  .sp-body { padding: 14px 16px; }
  .sp-foot { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>CJB Comfort — Admin</h1>
  <button onclick="openSchedPanel()" style="background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.55);color:#fff;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">+ Schedule</button>
  <span class="header-sub" id="load-status"><span class="spinner"></span> Loading…</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-dash" onclick="switchTab('dash')">Dashboard</button>
  <button class="tab-btn" id="tab-customers" onclick="switchTab('customers')">Customers</button>
</div>

<!-- Dashboard view -->
<div class="dash" id="dash-view">
  <div id="dash-content" style="padding:40px 0;text-align:center;"><span class="spinner"></span></div>
</div>

<!-- Customers view -->
<div class="app" id="app-customers" style="display:none;">
  <div class="sidebar">
    <div class="sidebar-hd">
      <h2>Customers <span id="cust-count"></span></h2>
      <input class="search-box" id="search" type="text" placeholder="Search name or email…" oninput="filterCustomers()">
      <button class="sidebar-add-btn" onclick="openCustomerForm()">+ New Customer</button>
    </div>
    <div class="cust-list" id="cust-list">
      <div class="empty-list">Loading…</div>
    </div>
  </div>

  <div class="detail" id="detail">
    <button class="mobile-back" id="mobile-back" onclick="mobileBack()" style="display:none;">← Customers</button>
    <div class="empty-state">
      <span class="arrow">←</span>
      <span>Select a customer</span>
    </div>
  </div>
</div>

<!-- Data entry form modal -->
<div class="modal-bg hidden" id="form-modal">
  <div class="modal" style="max-width:620px;" id="form-modal-body"></div>
</div>

<!-- Invoice modal -->
<div class="modal-bg hidden" id="invoice-modal">
  <div class="modal">
    <div class="modal-title">Create Invoice</div>
    <div class="modal-sub" id="modal-sub">—</div>

    <!-- Job summary — what Cornell recorded -->
    <div id="job-summary"></div>

    <div class="li-table-wrap">
    <table class="li-table">
      <thead>
        <tr>
          <th style="width:42%">Product / Description</th>
          <th style="width:10%">Qty</th>
          <th style="width:16%">Unit Price</th>
          <th style="width:14%">Subtotal</th>
          <th style="width:6%"></th>
        </tr>
      </thead>
      <tbody id="li-body"></tbody>
    </table>
    </div><!-- /.li-table-wrap -->

    <button class="btn btn-gray btn-sm" onclick="addLineItem()" style="margin-bottom:16px;">+ Add Line Item</button>

    <div class="total-row">
      <span class="total-lbl">Total</span>
      <span class="total-amt" id="inv-total">$0.00</span>
    </div>

    <textarea class="notes-inp" id="inv-notes" placeholder="Notes visible to the customer (optional)…"></textarea>

    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gray" id="draft-btn" onclick="submitInvoice(false)">Save Draft</button>
      <button class="btn btn-green" id="send-btn" onclick="submitInvoice(true)">Send Invoice Now</button>
    </div>
  </div>
</div>

<!-- Schedule slide-in panel -->
<div class="sched-overlay" id="sched-overlay" onclick="closeSchedPanel()"></div>
<div class="sched-panel" id="sched-panel">
  <div class="sp-hd">
    <span class="sp-hd-title">Schedule Appointment</span>
    <button class="sp-close" onclick="closeSchedPanel()">✕</button>
  </div>
  <div class="sp-steps">
    <div class="sp-step sp-active" id="sp-s1">1. Who</div>
    <div class="sp-step" id="sp-s2">2. Details</div>
    <div class="sp-step" id="sp-s3">3. When</div>
  </div>
  <div class="sp-body" id="sp-body"></div>
  <div class="sp-foot" id="sp-foot"></div>
</div>

<script>
const PROXY  = 'https://cjb-comfort-proxy.bridgettrhart.workers.dev/api';

let allCustomers   = [];
let filteredCustomers = [];
let allProperties  = [];
let allContacts    = [];
let allProducts    = null;
let selectedCustomer  = null;
let currentWorkOrders = [];
let currentProperties = [];
let currentContacts   = [];
let liCount = 0;
let invoiceWOId   = null;
let invoiceCustId = null;

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [custs, props, contacts] = await Promise.all([
      fetchAll('Customers',
        'fields[]=Customer Name&fields[]=First Name&fields[]=Last Name' +
        '&fields[]=Email&fields[]=Phone&fields[]=Type&fields[]=Active&fields[]=Notes' +
        '&fields[]=Billing Address&fields[]=Billing City&fields[]=Billing State&fields[]=Billing Zip' +
        '&sort[0][field]=Customer Name&sort[0][direction]=asc'),
      fetchAll('Properties',
        'fields[]=Property Name&fields[]=Service Address&fields[]=City&fields[]=State' +
        '&fields[]=Customer Email&fields[]=Customer&fields[]=Active'),
      fetchAll('Contacts',
        'fields[]=Contact Name&fields[]=First Name&fields[]=Last Name&fields[]=Title' +
        '&fields[]=Email&fields[]=Phone&fields[]=Alt Phone' +
        '&fields[]=Preferred Contact Method&fields[]=Is Primary Contact' +
        '&fields[]=Customers&fields[]=Active&fields[]=Notes' +
        '&sort[0][field]=Contact Name&sort[0][direction]=asc'),
    ]);
    allCustomers   = custs.filter(c => c.fields['Active'] !== false);
    allProperties  = props.filter(p => p.fields['Active'] !== false);
    allContacts    = contacts.filter(c => c.fields['Active'] !== false);
    filteredCustomers = [...allCustomers];
    document.getElementById('cust-count').textContent = '(' + allCustomers.length + ')';
    document.getElementById('load-status').textContent = allCustomers.length + ' customers';
    renderCustList();
    loadDashboard();
  } catch (err) {
    document.getElementById('load-status').textContent = 'Error: ' + err.message;
  }
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-dash').classList.toggle('active', tab === 'dash');
  document.getElementById('tab-customers').classList.toggle('active', tab === 'customers');
  document.getElementById('dash-view').style.display      = tab === 'dash'      ? '' : 'none';
  document.getElementById('app-customers').style.display  = tab === 'customers' ? '' : 'none';
  if (tab === 'dash') loadDashboard();
  if (tab === 'customers' && isMobile()) {
    // Always land on the list view when switching to customers on mobile
    document.querySelector('.sidebar').classList.remove('mobile-hidden');
    document.getElementById('detail').classList.remove('mobile-visible');
    selectedCustomer = null;
    renderCustList();
  }
}

// ── Dashboard ────────────────────────────────────────────────────────────────
let _dashWOs = null;
let _dashFlaggedJobs = null;
let _dashLoadedAt = 0;

const _pad = n => String(n).padStart(2, '0');
const _azDate = iso => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.substring(0, 10);
  const az = new Date(d.getTime() - 7 * 3600000);
  return `${az.getUTCFullYear()}-${_pad(az.getUTCMonth()+1)}-${_pad(az.getUTCDate())}`;
};
const _azTime = iso => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const az = new Date(d.getTime() - 7 * 3600000);
  let h = az.getUTCHours(), m = az.getUTCMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${_pad(m)} ${ap}`;
};

async function loadDashboard(force) {
  if (!force && _dashWOs && Date.now() - _dashLoadedAt < 120000) {
    renderDashboard(_dashWOs, _dashFlaggedJobs);
    return;
  }
  document.getElementById('dash-content').innerHTML =
    '<div style="padding:60px 0;text-align:center;"><span class="spinner"></span></div>';
  try {
    const woFormula  = encodeURIComponent(`NOT({Status}="Cancelled")`);
    const jobFormula = encodeURIComponent(`{Follow Up Required}=TRUE()`);
    [_dashWOs, _dashFlaggedJobs] = await Promise.all([
      fetchAll('Work Orders',
        `filterByFormula=${woFormula}&sort[0][field]=Scheduled Date&sort[0][direction]=asc`),
      fetchAll('Jobs',
        `filterByFormula=${jobFormula}&fields[]=Job Name&fields[]=Follow Up Notes&fields[]=Work Order&fields[]=Status`)
    ]);
    _dashLoadedAt = Date.now();
    renderDashboard(_dashWOs, _dashFlaggedJobs);
  } catch(err) {
    document.getElementById('dash-content').innerHTML =
      `<div style="color:#c81f25;padding:20px;">${esc(err.message)}</div>`;
  }
}

function renderDashboard(wos, flaggedJobs) {
  const now      = new Date();
  const todayStr = _azDate(now.toISOString());
  const monthStr = todayStr.substring(0, 7);

  // Build Mon–Sun week day strings
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  const weekDays = Array.from({length: 7}, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i); return _azDate(d.toISOString());
  });

  // Partition records client-side
  const todayWOs     = wos.filter(w => _azDate(w.fields['Scheduled Date']) === todayStr);
  const weekCounts   = {};
  weekDays.forEach(d => weekCounts[d] = 0);
  wos.forEach(w => { const d = _azDate(w.fields['Scheduled Date']); if (d in weekCounts) weekCounts[d]++; });

  const thisMonthWOs = wos.filter(w => _azDate(w.fields['Scheduled Date']).startsWith(monthStr));
  const needsInvoice = wos.filter(w => w.fields['Status'] === 'Complete');
  const hasDraftId   = w => !!(w.fields['Stripe Invoice ID']);

  // Build WO lookup map for joining flagged jobs to customer/date info
  const woById = {};
  wos.forEach(w => { woById[w.id] = w; });
  const flagged = (flaggedJobs || []).map(job => {
    const woId = (job.fields['Work Order'] || [])[0] || null;
    const wo   = woId ? (woById[woId] || null) : null;
    return { job, wo, woId };
  });

  // Stats
  const completedCount = thisMonthWOs.filter(w => ['Complete','Invoiced','Paid'].includes(w.fields['Status'])).length;
  const invoicedAmt    = thisMonthWOs.filter(w => ['Invoiced','Paid'].includes(w.fields['Status']))
                           .reduce((s, w) => s + (Number(w.fields['Total Amount']) || 0), 0);
  const collectedAmt   = thisMonthWOs.filter(w => w.fields['Status'] === 'Paid')
                           .reduce((s, w) => s + (Number(w.fields['Total Amount']) || 0), 0);
  const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  const dayAbbr   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmt$      = n => '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  const fmtDate   = iso => iso ? new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  const badgeCls = { 'Scheduled':'b-scheduled','In Progress':'b-in-progress','Complete':'b-complete',
    'Invoiced':'b-invoiced','Paid':'b-paid','On Hold':'b-on-hold','Cancelled':'b-cancelled' };

  // ── Stat cards ──
  const statsHtml = `<div class="dash-grid-3">
    <div class="stat-card">
      <div class="stat-label">Today's Jobs</div>
      <div class="stat-value">${todayWOs.length}</div>
      <div class="stat-sub">${todayWOs.filter(w => w.fields['Status'] === 'Complete').length} completed today</div>
    </div>
    <div class="stat-card ${needsInvoice.length ? 'alert' : ''}">
      <div class="stat-label">Needs Invoice</div>
      <div class="stat-value">${needsInvoice.length}</div>
      <div class="stat-sub">Complete, unbilled</div>
    </div>
    <div class="stat-card good">
      <div class="stat-label">Collected — ${monthName}</div>
      <div class="stat-value">${fmt$(collectedAmt)}</div>
      <div class="stat-sub">${fmt$(invoicedAmt)} invoiced · ${completedCount} jobs done</div>
    </div>
  </div>`;

  // ── Week strip ──
  const weekHtml = `<div class="widget" style="margin-bottom:16px;">
    <div class="widget-hd">
      <div class="widget-title">This Week</div>
      <button class="widget-refresh" onclick="loadDashboard(true)">↻ Refresh</button>
    </div>
    <div class="week-strip">
      ${weekDays.map(ds => {
        const count   = weekCounts[ds] || 0;
        const isToday = ds === todayStr;
        const d = new Date(ds + 'T12:00:00');
        return `<div class="week-day${isToday ? ' is-today' : ''}${count ? ' has-jobs' : ''}">
          <div class="wd-name">${dayAbbr[d.getDay()]}</div>
          <div class="wd-num">${d.getDate()}</div>
          <div class="wd-count">${count ? count + (count > 1 ? ' jobs' : ' job') : '—'}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // ── Today's schedule ──
  const schedHtml = `<div class="widget">
    <div class="widget-hd">
      <div class="widget-title">Today's Schedule</div>
      <span class="widget-count${todayWOs.length ? ' red' : ''}">${todayWOs.length}</span>
    </div>
    ${!todayWOs.length
      ? '<div class="widget-empty">No jobs scheduled today</div>'
      : todayWOs.map(w => {
          const f      = w.fields;
          const status = f['Status'] || 'Scheduled';
          const cls    = badgeCls[status] || 'b-scheduled';
          const time   = _azTime(f['Scheduled Date']);
          const addr   = [f['Service Address'], f['City']].filter(Boolean).join(', ');
          const tech   = Array.isArray(f['Technician Name']) ? f['Technician Name'][0] : (f['Technician Name'] || '');
          const invBtn = status === 'Complete'
            ? (hasDraftId(w)
                ? `<button class="btn btn-gray btn-sm" onclick="dashInvoice('${w.id}')">Edit Draft</button>`
                : `<button class="btn btn-green btn-sm" onclick="dashInvoice('${w.id}')">Invoice</button>`)
            : '';
          return `<div class="sched-row">
            <div class="sched-time">${esc(time)}</div>
            <div class="sched-info dash-link" onclick="dashGoCustomer('${w.id}')">
              <div class="sched-name">${esc(f['Customer Name'] || '(no customer)')}</div>
              <div class="sched-meta">${esc(addr)}${f['Work Order Type'] ? ' · ' + f['Work Order Type'] : ''}${tech ? ' · ' + tech : ''}</div>
            </div>
            <div class="sched-actions">
              <span class="badge ${cls}">${esc(status)}</span>
              ${invBtn}
            </div>
          </div>`;
        }).join('')}
  </div>`;

  // ── Needs invoice ──
  const invHtml = `<div class="widget">
    <div class="widget-hd">
      <div class="widget-title">Needs Invoice</div>
      <span class="widget-count${needsInvoice.length ? ' red' : ''}">${needsInvoice.length}</span>
    </div>
    ${!needsInvoice.length
      ? '<div class="widget-empty">All complete jobs are invoiced</div>'
      : needsInvoice.map(w => {
          const f = w.fields;
          return `<div class="inv-row">
            <div class="inv-info dash-link" onclick="dashGoCustomer('${w.id}')">
              <div class="inv-name">${esc(f['Customer Name'] || f['Work Order Name'] || '(unnamed)')}</div>
              <div class="inv-meta">${esc(fmtDate(f['Scheduled Date']))}${f['Work Order Type'] ? ' · ' + f['Work Order Type'] : ''}</div>
            </div>
            ${hasDraftId(w)
              ? `<button class="btn btn-gray btn-sm" onclick="dashInvoice('${w.id}')">Edit Draft</button>`
              : `<button class="btn btn-green btn-sm" onclick="dashInvoice('${w.id}')">Invoice</button>`}
          </div>`;
        }).join('')}
  </div>`;

  // ── Flagged for office ──
  const flaggedHtml = `<div class="widget">
    <div class="widget-hd">
      <div class="widget-title">Flagged for Office</div>
      <span class="widget-count${flagged.length ? ' gold' : ''}">${flagged.length}</span>
    </div>
    ${!flagged.length
      ? '<div class="widget-empty">Nothing flagged</div>'
      : flagged.map(({job, wo, woId}) => {
          const jf       = job.fields;
          const wf       = wo?.fields || {};
          const custName = Array.isArray(wf['Customer Name']) ? wf['Customer Name'][0] : (wf['Customer Name'] || '(unknown)');
          const date     = fmtDate(wf['Scheduled Date']);
          const woType   = wf['Work Order Type'] || '';
          const note     = jf['Follow Up Notes'] || '';
          const viewBtn  = woId
            ? `<button class="btn btn-gray btn-sm" onclick="dashGoCustomer('${woId}')">View</button>`
            : '';
          return `<div class="inv-row">
            <div class="inv-info">
              <div class="inv-name">${esc(custName)}</div>
              <div class="inv-meta">${esc(date)}${woType ? ' · ' + woType : ''}</div>
              ${note ? `<span class="flag-note">⚑ ${esc(note)}</span>` : ''}
            </div>
            ${viewBtn}
          </div>`;
        }).join('')}
  </div>`;

  document.getElementById('dash-content').innerHTML =
    statsHtml + weekHtml +
    `<div class="dash-row">${schedHtml}${invHtml}</div>` +
    `<div class="dash-row">${flaggedHtml}<div></div></div>`;
}

// Launch invoice modal from dashboard (doesn't require customer to be pre-selected)
async function dashInvoice(woId) {
  const wo = _dashWOs?.find(w => w.id === woId);
  if (!wo) return;
  const custName = Array.isArray(wo.fields['Customer Name'])
    ? wo.fields['Customer Name'][0] : wo.fields['Customer Name'];
  const cust = allCustomers.find(c => c.fields['Customer Name'] === custName);
  if (!cust) {
    alert('Customer record not found. Open from the Customers tab instead.');
    return;
  }
  selectedCustomer  = cust;
  currentWorkOrders = [wo];
  openInvoiceModal(woId, cust.id);
}

// Jump to customer record from dashboard
function dashGoCustomer(woId) {
  const wo = _dashWOs?.find(w => w.id === woId);
  if (!wo) return;
  const custName = Array.isArray(wo.fields['Customer Name'])
    ? wo.fields['Customer Name'][0] : wo.fields['Customer Name'];
  const cust = allCustomers.find(c => c.fields['Customer Name'] === custName);
  if (!cust) { alert('Customer not found.'); return; }
  switchTab('customers');
  selectCustomer(cust.id);
}

async function fetchAll(table, qs) {
  let all = [], offset = null;
  do {
    let url = `${PROXY}/${encodeURIComponent(table)}?pageSize=100&${qs}`;
    if (offset) url += '&offset=' + encodeURIComponent(offset);
    const res = await fetch(url);
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error('Failed to fetch ' + table + ': ' + res.status + ' — ' + body);
    }
    const data = await res.json();
    all = all.concat(data.records || []);
    offset = data.offset || null;
  } while (offset);
  return all;
}

// ── Customer list ───────────────────────────────────────────────────────────
function filterCustomers() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filteredCustomers = q
    ? allCustomers.filter(c =>
        (c.fields['Customer Name'] || '').toLowerCase().includes(q) ||
        (c.fields['Email'] || '').toLowerCase().includes(q))
    : [...allCustomers];
  renderCustList();
}

function renderCustList() {
  const el = document.getElementById('cust-list');
  if (!filteredCustomers.length) {
    el.innerHTML = '<div class="empty-list">No customers found</div>';
    return;
  }
  el.innerHTML = filteredCustomers.map(c => {
    const f = c.fields;
    const email = f['Email'] || '';
    const propCount = email
      ? allProperties.filter(p =>
          (p.fields['Customer Email'] || '').toLowerCase() === email.toLowerCase()).length
      : 0;
    const active = selectedCustomer && selectedCustomer.id === c.id ? ' active' : '';
    return `<div class="cust-item${active}" onclick="selectCustomer('${c.id}')">
      <div class="ci-name">${esc(f['Customer Name'] || '(no name)')}</div>
      <div class="ci-meta">${esc(email)}${propCount ? ' · ' + propCount + ' prop.' : ''}${f['Type'] ? ' · ' + f['Type'] : ''}</div>
    </div>`;
  }).join('');
}

function isMobile() { return window.innerWidth <= 768; }

function mobileBack() {
  document.getElementById('detail').classList.remove('mobile-visible');
  document.querySelector('.sidebar').classList.remove('mobile-hidden');
  selectedCustomer = null;
  renderCustList();
}

// ── Customer detail ─────────────────────────────────────────────────────────
async function selectCustomer(id) {
  selectedCustomer = allCustomers.find(c => c.id === id);
  if (!selectedCustomer) return;
  renderCustList();

  if (isMobile()) {
    document.querySelector('.sidebar').classList.add('mobile-hidden');
    const det = document.getElementById('detail');
    det.classList.add('mobile-visible');
    document.getElementById('mobile-back').style.display = 'block';
  }

  const det = document.getElementById('detail');
  det.innerHTML = (isMobile() ? '<button class="mobile-back" onclick="mobileBack()">← Customers</button>' : '') +
    '<div class="empty-state"><span class="spinner"></span></div>';

  try {
    const email = (selectedCustomer.fields['Email'] || '').toLowerCase();
    const props = allProperties.filter(p => {
      if ((p.fields['Customer'] || []).includes(id)) return true;
      return email && (p.fields['Customer Email'] || '').toLowerCase() === email;
    });
    currentProperties = props;

    const contacts = allContacts.filter(c =>
      (c.fields['Customers'] || []).includes(id)
    );
    currentContacts = contacts;

    // Fetch customer record to get linked Work Order IDs
    const custDetail = await fetch(`${PROXY}/Customers/${id}?fields[]=Work+Orders`).then(r => r.json());
    const woIds = custDetail.fields?.['Work Orders'] || [];

    currentWorkOrders = [];
    if (woIds.length > 0) {
      const formula = woIds.length === 1
        ? `RECORD_ID()="${woIds[0]}"`
        : `OR(${woIds.map(wid => `RECORD_ID()="${wid}"`).join(',')})`;
      const woUrl = `${PROXY}/Work%20Orders` +
        `?filterByFormula=${encodeURIComponent(formula)}` +
        '&fields[]=Work Order Name&fields[]=Status&fields[]=Work Order Type' +
        '&fields[]=Scheduled Date&fields[]=Total Amount&fields[]=Internal Notes' +
        '&sort[0][field]=Scheduled Date&sort[0][direction]=desc';
      const woData = await fetch(woUrl).then(r => r.json());
      currentWorkOrders = woData.records || [];
    }

    renderDetail(selectedCustomer, props, currentWorkOrders, contacts);
  } catch (err) {
    det.innerHTML = `<div class="empty-state" style="color:#c81f25;">Error: ${esc(err.message)}</div>`;
  }
}

// ── Invoice modal ───────────────────────────────────────────────────────────
async function openInvoiceModal(workOrderId, customerId) {
  invoiceWOId   = workOrderId;
  invoiceCustId = customerId;
  liCount = 0;

  document.getElementById('li-body').innerHTML    = '';
  document.getElementById('inv-notes').value      = '';
  document.getElementById('inv-total').textContent = '$0.00';
  document.getElementById('job-summary').innerHTML = '<div style="color:#aaa;font-size:13px;padding:8px 0;">Loading job details…</div>';
  document.getElementById('draft-btn').disabled   = true;
  document.getElementById('send-btn').disabled    = true;
  document.getElementById('send-btn').textContent = 'Loading…';

  const wo = currentWorkOrders.find(w => w.id === workOrderId);
  document.getElementById('modal-sub').textContent = wo?.fields['Work Order Name'] || '—';
  document.getElementById('invoice-modal').classList.remove('hidden');

  // Check if there's an existing Stripe draft for this work order
  const woForModal = currentWorkOrders.find(w => w.id === workOrderId);
  let existingStripeId = (woForModal?.fields?.['Stripe Invoice ID'] || '').trim() || null;

  try {
    // Always load products + job details (jobs shown in summary panel regardless)
    const [prodsRaw, woDetail] = await Promise.all([
      allProducts
        ? Promise.resolve(null)
        : fetchAll('Product List',
            'fields[]=Product Name&fields[]=Unit Price&fields[]=Unit Type&fields[]=Category' +
            '&fields[]=Active&sort[0][field]=Product Name&sort[0][direction]=asc'),
      fetch(`${PROXY}/Work%20Orders/${workOrderId}?fields[]=Jobs`).then(r => r.json())
    ]);
    if (prodsRaw) allProducts = prodsRaw.filter(p => p.fields['Active'] !== false);

    // Fetch job details for the summary panel
    const jobIds = woDetail.fields?.['Jobs'] || [];
    let jobs = [];
    if (jobIds.length > 0) {
      const formula = jobIds.length === 1
        ? `RECORD_ID()="${jobIds[0]}"`
        : `OR(${jobIds.map(j => `RECORD_ID()="${j}"`).join(',')})`;
      const jobData = await fetch(
        `${PROXY}/Jobs?filterByFormula=${encodeURIComponent(formula)}` +
        '&fields[]=Job Name&fields[]=Job Type&fields[]=Status' +
        '&fields[]=Work Performed&fields[]=Parts Used&fields[]=Diagnosis&fields[]=Labor Hours&fields[]=Recommendations'
      ).then(r => r.json());
      jobs = jobData.records || [];
    }

    renderJobSummary(jobs);

    // Auto-fill customer notes from job details (new invoices only)
    if (!existingStripeId && jobs.length > 0) {
      const parts = jobs.map(j => j.fields['Diagnosis']).filter(Boolean);
      if (parts.length) {
        const full = parts.join('\n\n');
        document.getElementById('inv-notes').value = full.length > 500 ? full.slice(0, 497) + '…' : full;
      }
    }

    if (existingStripeId) {
      // ── Edit Draft: load line items + notes from the saved Stripe draft ──
      const draftRes = await fetch(`${PROXY}/invoice/${existingStripeId}`);
      const draft    = await draftRes.json();
      const draftGone = !draftRes.ok || draft.error;

      if (!draftGone) {
        // Restore notes from the Stripe invoice description
        const savedNotes = draft.description || draft.footer || '';
        if (savedNotes) document.getElementById('inv-notes').value = savedNotes;

        // Restore line items exactly as saved
        for (const line of (draft.lines || [])) {
          fillLineItem(line.description, line.quantity, line.unitPrice, null);
        }
        if (!draft.lines?.length) addLineItem();
      } else {
        // Draft no longer exists in Stripe — fall back to fresh invoice
        existingStripeId = null;
        if (jobs.length > 0) {
          addServiceCallItem(jobs, woForModal?.fields['Scheduled Date']);
          for (const job of jobs) addPartsFromJob(job);
          const parts = jobs.map(j => j.fields['Diagnosis']).filter(Boolean);
          if (parts.length) {
            const full = parts.join('\n\n');
            document.getElementById('inv-notes').value = full.length > 500 ? full.slice(0, 497) + '…' : full;
          }
        } else {
          addLineItem();
        }
      }

    } else {
      // ── New invoice: derive line items from job data ──
      if (jobs.length > 0) {
        addServiceCallItem(jobs, woForModal?.fields['Scheduled Date']);
        for (const job of jobs) addPartsFromJob(job);
      } else {
        addLineItem();
      }
    }

  } catch (err) {
    document.getElementById('job-summary').innerHTML =
      `<div style="color:#c81f25;font-size:12px;">Could not load details: ${esc(err.message)}</div>`;
    addLineItem();
  }

  document.getElementById('draft-btn').disabled   = false;
  document.getElementById('send-btn').disabled    = false;
  document.getElementById('send-btn').textContent = 'Send Invoice Now';
}

function renderJobSummary(jobs) {
  const el = document.getElementById('job-summary');
  if (!jobs.length) {
    el.innerHTML = '<div style="color:#aaa;font-size:12px;margin-bottom:12px;">No jobs recorded on this work order yet.</div>';
    return;
  }
  const rows = jobs.map(job => {
    const jf = job.fields;
    const lines = [];
    if (jf['Work Performed'])   lines.push(`<div class="job-block-line"><span class="job-block-label">✅ Work done:</span>${esc(jf['Work Performed'])}</div>`);
    if (jf['Diagnosis'])        lines.push(`<div class="job-block-line"><span class="job-block-label">🔍 Diagnosis:</span>${esc(jf['Diagnosis'])}</div>`);
    if (jf['Recommendations'])  lines.push(`<div class="job-block-line"><span class="job-block-label">💡 Recommendations:</span>${esc(jf['Recommendations'])}</div>`);
    if (jf['Parts Used'])       lines.push(`<div class="job-block-line"><span class="job-block-label">🔧 Parts used:</span>${esc(jf['Parts Used'])}</div>`);
    if (jf['Labor Hours'])      lines.push(`<div class="job-block-line"><span class="job-block-label">⏱ Labor:</span>${jf['Labor Hours']} hrs</div>`);
    return `<div class="job-block">
      <div><span class="job-block-name">${esc(jf['Job Name'] || '(unnamed job)')}</span><span class="job-block-type">${esc(jf['Job Type'] || '')}</span></div>
      ${lines.join('')}
    </div>`;
  }).join('');
  el.innerHTML = `<div class="job-summary-panel">
    <div class="job-summary-title">📋 What the technician recorded (${jobs.length} job${jobs.length > 1 ? 's' : ''})</div>
    ${rows}
  </div>`;
}

function parsePartsUsed(text) {
  // Format written by the field app:
  //   "2x Air Filter | $2.50"
  //   "Condenser Fan Motor Mounting Assembly | $500.00"
  //   "Custom: freeform note"
  if (!text) return [];
  return text.split('\n').filter(Boolean).map(line => {
    if (line.startsWith('Custom: ')) {
      return { name: line.slice(8).trim(), qty: 1, price: null };
    }
    let qty = 1, name = line, price = null;
    const priceMatch = line.match(/\s*\|\s*\$([0-9.]+)\s*$/);
    if (priceMatch) {
      price = parseFloat(priceMatch[1]);
      name  = line.slice(0, priceMatch.index).trim();
    }
    const qtyMatch = name.match(/^(\d+)x\s+/);
    if (qtyMatch) { qty = parseInt(qtyMatch[1]); name = name.slice(qtyMatch[0].length).trim(); }
    return { name, qty, price };
  });
}

function fillLineItem(name, qty, price, productId) {
  addLineItem();
  const idx = liCount - 1;
  const nameEl  = document.getElementById('lin-' + idx);
  const qtyEl   = document.getElementById('liq-' + idx);
  const priceEl = document.getElementById('lip-' + idx);
  if (nameEl)  { nameEl.value = name; if (productId) nameEl.dataset.pid = productId; }
  if (qtyEl)   qtyEl.value = qty || 1;
  if (priceEl && price != null) priceEl.value = Number(price).toFixed(2);
  liCalc(idx);
}

function addServiceCallItem(jobs, scheduledDate) {
  // After-hours = weekends (Sat/Sun) OR before 6am OR at/after 6pm
  const date        = scheduledDate ? new Date(scheduledDate) : null;
  const day         = date ? date.getDay() : -1;   // 0=Sun, 6=Sat
  const hour        = date ? date.getHours() : -1;
  const isWeekend   = day === 0 || day === 6;
  const isOddHour   = hour !== -1 && (hour < 6 || hour >= 18);
  const isAfterHours = isWeekend || isOddHour;

  const custType     = (selectedCustomer?.fields['Type'] || '').toLowerCase();
  const isCommercial = custType === 'commercial';

  // Classify job types on this work order
  const jobTypes = jobs.map(j => (j.fields['Job Type'] || '').toLowerCase());
  const isInspectionOrMaintenance = jobTypes.some(t => t === 'maintenance' || t === 'inspection');

  // After-hours always takes priority — premium rate regardless of job type
  let productName;
  if (isAfterHours) {
    productName = 'Service Call Fee — After Hours';
  } else if (isInspectionOrMaintenance) {
    // Scheduled maintenance or inspection visit
    productName = isCommercial ? 'A/C Inspection — Commercial' : 'A/C Inspection — Residential';
  } else {
    // Repair, diagnostic, callback, warranty — something went wrong and they called
    productName = isCommercial ? 'Service Call Fee — Commercial' : 'Service Call Fee — Residential';
  }

  const product = allProducts?.find(p => p.fields['Product Name'] === productName);
  fillLineItem(
    product ? product.fields['Product Name'] : productName,
    1,
    product ? (product.fields['Unit Price'] || null) : null,
    product?.id || null
  );
}

function addPartsFromJob(job) {
  // Only add parts — service call is handled separately above
  const parts = parsePartsUsed(job.fields['Parts Used']);
  for (const part of parts) {
    const prodMatch = allProducts?.find(p =>
      (p.fields['Product Name'] || '').toLowerCase() === part.name.toLowerCase()
    );
    fillLineItem(part.name, part.qty, part.price, prodMatch?.id || null);
  }
}

function closeModal() {
  document.getElementById('invoice-modal').classList.add('hidden');
}

function addLineItem() {
  const idx = liCount++;
  const tr = document.createElement('tr');
  tr.id = 'li-' + idx;
  tr.innerHTML = `
    <td>
      <div class="pd-wrap">
        <input class="inp-name" type="text" id="lin-${idx}" placeholder="Type to search products…"
          oninput="pdSearch(${idx})" onfocus="pdSearch(${idx})" onblur="pdHide(${idx})"
          autocomplete="off">
        <div class="pd-drop hidden" id="pd-${idx}"></div>
      </div>
    </td>
    <td><input class="inp-qty" type="number" id="liq-${idx}" value="1" min="0.01" step="any" oninput="liCalc(${idx})"></td>
    <td><input class="inp-price" type="number" id="lip-${idx}" value="" placeholder="0.00" step="0.01" oninput="liCalc(${idx})"></td>
    <td class="sub-val" id="lis-${idx}">$0.00</td>
    <td><button class="del-btn" onclick="removeLi(${idx})">×</button></td>`;
  document.getElementById('li-body').appendChild(tr);
}

function removeLi(idx) {
  const row = document.getElementById('li-' + idx);
  if (row) row.remove();
  updateTotal();
}

function pdSearch(idx) {
  const q   = (document.getElementById('lin-' + idx)?.value || '').toLowerCase().trim();
  const drop = document.getElementById('pd-' + idx);
  if (!drop) return;
  if (!q || !allProducts?.length) { drop.classList.add('hidden'); return; }

  const matches = allProducts
    .filter(p => (p.fields['Product Name'] || '').toLowerCase().includes(q))
    .slice(0, 15);

  if (!matches.length) { drop.classList.add('hidden'); return; }

  drop.innerHTML = matches.map(p => {
    const price = p.fields['Unit Price'] || 0;
    const unit  = p.fields['Unit Type']  || '';
    return `<div class="pd-opt"
      data-idx="${idx}"
      data-id="${p.id}"
      data-name="${escAttr(p.fields['Product Name'] || '')}"
      data-price="${price}"
      onmousedown="pdSelect(this)">
        <div class="pd-opt-name">${esc(p.fields['Product Name'] || '')}</div>
        <div class="pd-opt-price">$${Number(price).toFixed(2)} / ${esc(unit)}</div>
      </div>`;
  }).join('');
  drop.classList.remove('hidden');
}

function pdHide(idx) {
  setTimeout(() => {
    const d = document.getElementById('pd-' + idx);
    if (d) d.classList.add('hidden');
  }, 160);
}

function pdSelect(el) {
  const idx   = el.dataset.idx;
  const name  = el.dataset.name;
  const price = parseFloat(el.dataset.price) || 0;
  const nameEl  = document.getElementById('lin-' + idx);
  const priceEl = document.getElementById('lip-' + idx);
  if (nameEl)  { nameEl.value = name; nameEl.dataset.pid = el.dataset.id; }
  if (priceEl) priceEl.value = price.toFixed(2);
  liCalc(idx);
  pdHide(idx);
}

function liCalc(idx) {
  const qty   = parseFloat(document.getElementById('liq-' + idx)?.value) || 0;
  const price = parseFloat(document.getElementById('lip-' + idx)?.value) || 0;
  const el    = document.getElementById('lis-' + idx);
  if (el) el.textContent = '$' + (qty * price).toFixed(2);
  updateTotal();
}

function updateTotal() {
  let t = 0;
  document.querySelectorAll('[id^="li-"]').forEach(row => {
    if (!row.id.match(/^li-\d+$/)) return;
    const idx = row.id.slice(3);
    const qty   = parseFloat(document.getElementById('liq-' + idx)?.value) || 0;
    const price = parseFloat(document.getElementById('lip-' + idx)?.value) || 0;
    t += qty * price;
  });
  document.getElementById('inv-total').textContent = '$' + t.toFixed(2);
}

async function submitInvoice(sendNow) {
  const lineItems = [];
  document.querySelectorAll('[id^="li-"]').forEach(row => {
    if (!row.id.match(/^li-\d+$/)) return;
    const idx   = row.id.slice(3);
    const nameEl  = document.getElementById('lin-' + idx);
    const qtyEl   = document.getElementById('liq-' + idx);
    const priceEl = document.getElementById('lip-' + idx);
    if (!nameEl || !qtyEl || !priceEl) return;
    const name  = (nameEl.value || '').trim();
    const qty   = parseFloat(qtyEl.value)   || 1;
    const price = parseFloat(priceEl.value) || 0;
    if (!name && price === 0) return;
    lineItems.push({
      productId:   nameEl.dataset.pid || null,
      productName: name || 'Service',
      quantity:    qty,
      unitPrice:   price
    });
  });

  if (!lineItems.length) { alert('Please add at least one line item.'); return; }

  const notes = document.getElementById('inv-notes').value.trim();
  const draftBtn = document.getElementById('draft-btn');
  const sendBtn  = document.getElementById('send-btn');
  draftBtn.disabled = true;
  sendBtn.disabled  = true;
  sendBtn.textContent = sendNow ? 'Sending…' : 'Saving…';

  try {
    const res = await fetch(`${PROXY}/invoice`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        workOrderId: invoiceWOId,
        customerId:  invoiceCustId,
        lineItems,
        notes,
        sendNow
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Invoice failed');

    closeModal();

    if (data.hostedUrl) {
      const go = confirm(sendNow
        ? '✅ Invoice sent to customer!\n\nOpen the Stripe invoice to confirm?'
        : '✅ Draft invoice saved.\n\nOpen in Stripe to review before sending?');
      if (go) window.open(data.hostedUrl, '_blank');
    } else {
      alert(sendNow ? '✅ Invoice sent!' : '✅ Draft saved.');
    }

    // Refresh work orders for this customer
    if (selectedCustomer) selectCustomer(selectedCustomer.id);

  } catch (err) {
    alert('Error: ' + err.message);
    draftBtn.disabled = false;
    sendBtn.disabled  = false;
    sendBtn.textContent = 'Send Invoice Now';
  }
}

// ── Link Existing modal ────────────────────────────────────────────────────────
let _linkType = null;

function openLinkModal(type) {
  _linkType = type;
  const isContact  = type === 'contact';
  const title      = isContact ? 'Link Existing Contact' : 'Link Existing Property';
  const placeholder = isContact ? 'Search by name or email…' : 'Search by name or address…';

  // Build candidate list — exclude already-linked records
  const linkedIds = isContact
    ? currentContacts.map(c => c.id)
    : currentProperties.map(p => p.id);
  const candidates = isContact
    ? allContacts.filter(c => !linkedIds.includes(c.id))
    : allProperties.filter(p => !linkedIds.includes(p.id));

  document.getElementById('form-modal-body').innerHTML = `
    <div class="modal-title">${title}</div>
    <div class="modal-sub">${esc(selectedCustomer?.fields['Customer Name'] || '')}</div>
    <input class="link-search" id="link-search" type="text" placeholder="${placeholder}"
      oninput="filterLinkList()" autocomplete="off">
    <div class="link-list" id="link-list"></div>
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn btn-gray" onclick="closeFormModal()">Cancel</button>
    </div>`;
  document.getElementById('form-modal').classList.remove('hidden');

  // Store candidates on the modal for filtering
  document.getElementById('link-list')._candidates = candidates;
  filterLinkList();
}

function filterLinkList() {
  const q    = (document.getElementById('link-search')?.value || '').toLowerCase().trim();
  const list = document.getElementById('link-list');
  if (!list) return;
  const candidates = list._candidates || [];
  const isContact  = _linkType === 'contact';

  const matches = candidates.filter(r => {
    const f = r.fields;
    if (isContact) {
      return !q
        || (f['Contact Name']||'').toLowerCase().includes(q)
        || (f['Email']||'').toLowerCase().includes(q)
        || (f['Phone']||'').toLowerCase().includes(q);
    } else {
      return !q
        || (f['Property Name']||'').toLowerCase().includes(q)
        || (f['Service Address']||'').toLowerCase().includes(q)
        || (f['City']||'').toLowerCase().includes(q);
    }
  }).slice(0, 50);

  if (!matches.length) {
    list.innerHTML = `<div class="link-empty">${q ? 'No matches found' : 'All records already linked'}</div>`;
    return;
  }

  list.innerHTML = matches.map(r => {
    const f = r.fields;
    let name, meta;
    if (isContact) {
      name = esc(f['Contact Name'] || [f['First Name'],f['Last Name']].filter(Boolean).join(' ') || '(no name)');
      meta = [f['Title'], f['Email'], f['Phone']].filter(Boolean).join(' · ');
    } else {
      name = esc(f['Property Name'] || '(unnamed)');
      meta = [f['Service Address'], f['City'], f['State']].filter(Boolean).join(', ');
    }
    return `<div class="link-item">
      <div class="link-item-info">
        <div class="link-item-name">${name}</div>
        ${meta ? `<div class="link-item-meta">${esc(meta)}</div>` : ''}
      </div>
      <button class="btn btn-red btn-sm" onclick="confirmLink('${r.id}')">Link</button>
    </div>`;
  }).join('');
  list.innerHTML && (list._candidates = candidates); // re-attach after innerHTML wipe
  document.getElementById('link-list')._candidates = candidates;
}

async function confirmLink(recordId) {
  if (!selectedCustomer) return;
  const custId = selectedCustomer.id;
  try {
    let fields, url;
    if (_linkType === 'contact') {
      const existing = allContacts.find(c => c.id === recordId);
      const current  = existing?.fields['Customers'] || [];
      fields = { 'Customers': [...new Set([...current, custId])] };
      url    = `${PROXY}/Contacts/${recordId}`;
    } else {
      fields = { 'Customer': [custId] };
      url    = `${PROXY}/Properties/${recordId}`;
    }
    const res = await fetch(url,
      { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));

    closeFormModal();
    // Refresh local cache and re-render
    if (_linkType === 'contact') {
      allContacts = await fetchAll('Contacts',
        'fields[]=Contact Name&fields[]=First Name&fields[]=Last Name&fields[]=Title' +
        '&fields[]=Email&fields[]=Phone&fields[]=Alt Phone' +
        '&fields[]=Preferred Contact Method&fields[]=Is Primary Contact' +
        '&fields[]=Customers&fields[]=Active&fields[]=Notes' +
        '&sort[0][field]=Contact Name&sort[0][direction]=asc');
      allContacts = allContacts.filter(c => c.fields['Active'] !== false);
    } else {
      allProperties = await fetchAll('Properties',
        'fields[]=Property Name&fields[]=Service Address&fields[]=City&fields[]=State' +
        '&fields[]=Customer Email&fields[]=Customer&fields[]=Active');
      allProperties = allProperties.filter(p => p.fields['Active'] !== false);
    }
    selectCustomer(custId);
  } catch(err) { alert('Error: ' + err.message); }
}

async function openWOForm(existingRecord) {
  formModalRecordId = existingRecord?.id || null;
  const f = existingRecord?.fields || {};
  const cust = selectedCustomer?.fields || {};

  // Load technicians once
  if (!_technicianOptions) {
    try {
      const data = await fetchAll('Technicians',
        'fields[]=Technician Name&fields[]=Active&sort[0][field]=Technician Name&sort[0][direction]=asc');
      _technicianOptions = data.filter(t => t.fields['Active'] !== false);
    } catch { _technicianOptions = []; }
  }

  // Properties for this customer — match by linked Customer ID or Customer Email
  const custId  = selectedCustomer?.id || '';
  const email   = (cust['Email']||'').toLowerCase();
  const custProps = allProperties.filter(p =>
    (custId && (p.fields['Customer'] || []).includes(custId)) ||

async function editWorkOrder(woId) {
  try {
    const res = await fetch(`${PROXY}/Work%20Orders/${woId}`);
    if (!res.ok) throw new Error('Could not load work order');
    const rec = await res.json();
    openWOForm(rec);
  } catch(err) { alert('Error: ' + err.message); }
}

async function submitWOForm() {
  const startVal = (document.getElementById('wf-start').value||'').trim();
  if (!startVal) { alert('Scheduled start date is required.'); return; }
  const custName = selectedCustomer?.fields['Customer Name'] || '';
  const fields = {
    'Work Order Name':     (document.getElementById('wf-name').value||'').trim() || `${custName} — Work Order`,
    'Work Order Type':     document.getElementById('wf-type').value,
    'Priority':            document.getElementById('wf-priority').value,
    'Scheduled Date':      new Date(startVal).toISOString(),
    'Service Mode':        document.getElementById('wf-mode').value,
    'Problem Description': (document.getElementById('wf-problem').value||'').trim(),
    'Notes':               (document.getElementById('wf-notes').value   ||'').trim(),
    'Active': true,
  };
  const endVal = (document.getElementById('wf-end').value||'').trim();
  if (endVal) fields['Scheduled End'] = new Date(endVal).toISOString();
  const propId = document.getElementById('wf-prop')?.value;
  if (propId) fields['Property'] = [propId];
  const techId = document.getElementById('wf-tech')?.value;
  if (techId) fields['Technician'] = [techId];
  if (selectedCustomer) fields['Customer'] = [selectedCustomer.id];
  const statusEl = document.getElementById('wf-status');
  if (statusEl) fields['Status'] = statusEl.value;
  else fields['Status'] = 'Scheduled';

  const btn = document.getElementById('form-submit-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    if (formModalRecordId) {
      const res = await fetch(`${PROXY}/Work%20Orders/${formModalRecordId}`,
        { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    } else {
      const res = await fetch(`${PROXY}/Work%20Orders`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fields}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    }
    closeFormModal();
    if (selectedCustomer) selectCustomer(selectedCustomer.id);
  } catch(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.textContent = formModalRecordId ? 'Save Changes' : 'Create Work Order';
  }
}

// ── Utilities ───────────────────────────────────────────────────────────────
function extractStripeUrl(internalNotes) {
  if (!internalNotes) return null;
  const m = internalNotes.match(/https:\/\/invoice\.stripe\.com\/[^\s]+/);
  return m ? m[0] : null;
}

function esc(s) {
  const str = Array.isArray(s) ? (s[0] ?? '') : (s ?? '');
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── SCHEDULE PANEL ──────────────────────────────────────────────────────────
let _sp = {};

function openSchedPanel() {
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  mon.setHours(0,0,0,0);
  _sp = {
    step: 1,
    cust: null, custProps: [], custContacts: [],
    newName: '', newPhone: '',
    woType: 'Maintenance', priority: 'Routine', mode: ' All Units',
    propId: null, contId: null, prob: '', notes: '',
    weekStart: mon,
    selDate: _azDate(now.toISOString()),
    weekWOs: null,
    startH: null, startM: null,
  };
  if (!_technicianOptions) {
    fetchAll('Technicians', 'fields[]=Technician Name&fields[]=Active')
      .then(d => { _technicianOptions = d.filter(t => t.fields['Active'] !== false); });
  }
  document.getElementById('sched-overlay').classList.add('open');
  document.getElementById('sched-panel').classList.add('open');
  spRender();
}

function closeSchedPanel() {
  document.getElementById('sched-overlay').classList.remove('open');
  document.getElementById('sched-panel').classList.remove('open');
}

function spRender() {
  ['1','2','3'].forEach((n, i) => {
    const el = document.getElementById('sp-s' + n);
    if (!el) return;
    const s = i + 1;
    el.className = 'sp-step' + (s === _sp.step ? ' sp-active' : s < _sp.step ? ' sp-done' : '');
  });
  const foot = document.getElementById('sp-foot');
  if (_sp.step === 1) {
    foot.innerHTML = `<button class="btn btn-gray" onclick="closeSchedPanel()">Cancel</button>
      <button class="btn btn-red" onclick="spGoNext()">Next: Details →</button>`;
  } else if (_sp.step === 2) {
    foot.innerHTML = `<button class="btn btn-gray" onclick="spGoBack()">← Back</button>
      <button class="btn btn-red" onclick="spGoNext()">Next: Schedule →</button>`;
  } else {
    foot.innerHTML = `<button class="btn btn-gray" onclick="spGoBack()">← Back</button>
      <button class="btn btn-green" id="sp-book-btn" onclick="spBook()">Book Appointment</button>`;
  }
  if (_sp.step === 1) spRenderStep1();
  else if (_sp.step === 2) spRenderStep2();
  else spRenderStep3();
}

    (c.fields['Email'] || '').toLowerCase().includes(q)

  drop.innerHTML = !matches.length
    ? '<div style="padding:12px 14px;font-size:13px;color:#bbb;">No matches</div>'

function spRenderWeek() {

  }
  const container = document.getElementById('sp-days');
  if (!container) return;
  container.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(_sp.weekStart.getTime() + i * 24 * 3600000);

    return `<button class="sp-day-btn${isSel ? ' sp-sel-day' : ''}${hasWOs && !isSel ? ' sp-has-wos' : ''}" onclick="spPickDay('${ds}')">
